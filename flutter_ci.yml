name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: 📦 Instalar dependências
        run: flutter pub get

      - name: 📝 Criar .env (Testes)
        run: |
          cat > .env << 'EOF'
          ENV=dev
          DB_ADMIN_PASSWORD=${{ secrets.DB_ADMIN_PASSWORD }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          WHATSAPP_ADMIN=${{ secrets.WHATSAPP_ADMIN }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_WEB_AUTH_DOMAIN=${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }}
          VAPID_KEY=${{ secrets.VAPID_KEY }}
          RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}
          FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_IOS_API_KEY=${{ secrets.FIREBASE_IOS_API_KEY }}
          FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
          FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}
          X_ACCESS_API_KEY=${{ secrets.X_ACCESS_API_KEY }}
          X_MASTER_API_KEY=${{ secrets.X_MASTER_API_KEY }}
          ACCESS_KEY_ID=${{ secrets.ACCESS_KEY_ID }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          EOF

      - name: 🧪 Executar Testes com Verificação de Cobertura
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov
          flutter test --coverage
          
          # Gera resumo e extrai a porcentagem
          lcov --summary coverage/lcov.info
          COVERAGE=$(lcov --summary coverage/lcov.info | grep "lines......" | cut -d ':' -f 2 | cut -d '%' -f 1 | xargs)
          echo "Cobertura Atual: $COVERAGE%"
          
          # Verifica se é menor que 80%
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Erro: Cobertura de testes abaixo de 80%!"
            exit 1
          fi 

      - name: 🏷️ Atualizar Badge no README
        if: github.ref == 'refs/heads/main'
        run: |
          # Define a cor baseada na cobertura
          COLOR="red"
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          fi
          
          # Substitui a linha do badge no README usando sed
          sed -i "s/Coverage-.*-.*)/Coverage-${COVERAGE}%25-${COLOR})/" README.md
          
          # Configura git e commita se houver mudanças
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "docs: update coverage badge to $COVERAGE%" || echo "No changes to commit"
          git push

      - name: 📝 Criar .env.prod (Secrets para Produção)
        # Apenas roda o build se for na branch main (evita gastar recursos em PRs simples ou expor secrets desnecessariamente)
        if: github.ref == 'refs/heads/main'
        run: |
          cat > .env.prod << 'EOF'
          ENV=prod
          DB_ADMIN_PASSWORD=${{ secrets.DB_ADMIN_PASSWORD }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          WHATSAPP_ADMIN=${{ secrets.WHATSAPP_ADMIN }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_WEB_AUTH_DOMAIN=${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }}
          VAPID_KEY=${{ secrets.VAPID_KEY }}
          RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}
          FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_IOS_API_KEY=${{ secrets.FIREBASE_IOS_API_KEY }}
          FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
          FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}
          X_ACCESS_API_KEY=${{ secrets.X_ACCESS_API_KEY }}
          X_MASTER_API_KEY=${{ secrets.X_MASTER_API_KEY }}
          ACCESS_KEY_ID=${{ secrets.ACCESS_KEY_ID }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          EOF

      - name: 🚀 Build APK (Produção)
        if: github.ref == 'refs/heads/main'
        run: |
          chmod +x build_prod.sh
          ./build_prod.sh

      - name: 📤 Upload do APK como Artefato
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      
      - name: 🔥 Upload para Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers # Crie este grupo no painel do Firebase App Distribution
          file: build/app/outputs/flutter-apk/app-release.apk